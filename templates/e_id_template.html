<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAMSTECH - Student E-ID</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0d1b3e;
            --accent-orange: #ff6f00;
        }
        body { font-family: 'Outfit', sans-serif; background: #f0f2f5; padding: 40px 20px; }
        .id-card {
            width: 380px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }
        .id-header {
            background: linear-gradient(135deg, var(--primary-blue) 0%, #0a1428 100%);
            padding: 25px;
            color: white;
            text-align: center;
        }
        .id-logo { height: 60px; margin-bottom: 10px; }
        .id-body { padding: 30px; text-align: center; }
        .photo-frame {
            width: 130px;
            height: 160px;
            background: #eee;
            border-radius: 12px;
            margin: 0 auto 20px;
            overflow: hidden;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        .id-name { font-size: 1.4rem; font-weight: 900; color: var(--primary-blue); text-transform: uppercase; margin-bottom: 5px; }
        .id-badge {
            background: var(--accent-orange);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
            display: inline-block;
            margin-bottom: 20px;
        }
        .id-details { display: flex; justify-content: space-around; border-top: 1px solid #eee; padding-top: 20px; }
        .detail-item span { display: block; }
        .label { font-size: 0.65rem; color: #999; font-weight: 700; text-transform: uppercase; }
        .value { font-size: 0.85rem; font-weight: 700; color: var(--primary-blue); }
        .id-footer { background: var(--accent-orange); height: 10px; }
    </style>
</head>
<body>
    <div class="id-card">
        <div class="id-header">
            <img src="{{ media_url(brand_logo_path, 'img/logo.png') }}" class="id-logo" onerror="this.style.display='none';">
            <h6 class="mb-0 fw-black" style="letter-spacing: 1px;">IAMSTECH LIBERIA</h6>
            <p class="small mb-0 opacity-75">Professional Technology Institute</p>
        </div>
        <div class="id-body">
            <div class="photo-frame">
                <img src="{{ media_url(current_user.profile_photo, 'img/logo.png') }}">
            </div>
            <div class="id-name">{{ current_user.name }}</div>
            <div class="id-badge">{{ current_user.student_id }}</div>
            <div class="id-details">
                <div class="detail-item">
                    <span class="label">Program</span>
                    <span class="value">{{ current_user.department }}</span>
                </div>
                <div class="detail-item">
                    <span class="label">Valid Thru</span>
                    <span class="value">DEC 2026</span>
                </div>
            </div>
        </div>
        <div class="id-footer"></div>
    </div>
    <div class="text-center mt-5">
        <button onclick="window.print()" class="btn btn-primary px-5 rounded-pill fw-bold">PRINT ID CARD</button>
    </div>
</body>
</html>
