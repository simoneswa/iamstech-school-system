{% extends 'base.html' %}

{% block title %}Face Verification{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card p-4">
            <h3 class="mb-4"><i class="fas fa-camera"></i> Face Recognition 2FA</h3>
            <div id="camera-container" class="mb-4 bg-dark rounded d-flex align-items-center justify-content-center" style="height: 300px; color: white;">
                <div id="placeholder">
                    <i class="fas fa-user-circle fa-5x mb-3"></i>
                    <p>Initializing camera...</p>
                </div>
                <video id="video" width="100%" height="100%" autoplay style="display: none; border-radius: 5px; object-fit: cover;"></video>
            </div>
            
            <form id="verify-form" method="POST">
                <button type="submit" class="btn btn-primary btn-lg w-100 mb-2">Verify Face</button>
                <a href="{{ url_for('login') }}" class="btn btn-outline-secondary w-100">Cancel</a>
            </form>
            
            <div class="mt-3">
                <small class="text-muted">Tip: Ensure you are in a well-lit area.</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Simulate webcam access
    const video = document.getElementById('video');
    const placeholder = document.getElementById('placeholder');

    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ video: true }).then(function(stream) {
            video.srcObject = stream;
            video.play();
            video.style.display = 'block';
            placeholder.style.display = 'none';
        }).catch(function(error) {
            console.log("Webcam error:", error);
            placeholder.innerHTML = '<i class="fas fa-exclamation-triangle fa-3x mb-3 text-warning"></i><p>Camera not found. Falling back to verification button.</p>';
        });
    }
</script>
{% endblock %}
