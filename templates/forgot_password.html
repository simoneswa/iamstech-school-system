{% extends 'base.html' %}

{% block title %}Forgot Password - IAMSTECH{% endblock %}

{% block content %}
<div class="container py-5 mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                <div class="card-header bg-dark text-white text-center py-4 border-0">
                    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="IAMSTECH Logo" class="brand-logo mb-3" style="height: 60px; filter: brightness(0) invert(1);">
                    <h4 class="fw-bold mb-1">Password Recovery</h4>
                    <p class="mb-0 small text-white-50">Enter your email to receive a reset link</p>
                </div>
                
                <div class="card-body p-4 p-md-5 bg-white">
                    <form method="POST" action="{{ url_for('forgot_password') }}">
                        <div class="mb-4">
                            <label for="email" class="form-label fw-bold small text-muted">Registered Email Address <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                                <input type="email" class="form-control bg-light border-start-0 ps-0" id="email" name="email" required placeholder="Enter your email">
                            </div>
                        </div>

                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary py-2 fw-bold rounded-3">
                                Send Recovery Link <i class="fas fa-paper-plane ms-2"></i>
                            </button>
                        </div>
                        
                        <div class="text-center mt-3">
                            <a href="{{ url_for('login') }}" class="text-decoration-none small text-muted"><i class="fas fa-arrow-left me-1"></i> Back to Login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
