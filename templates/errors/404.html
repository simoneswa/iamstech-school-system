{% extends 'base.html' %}

{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center py-5">
        <div class="col-lg-6">
            <div class="mb-4">
                <i class="fas fa-search fa-5x text-warning opacity-50"></i>
            </div>
            <h1 class="display-1 fw-black text-primary">404</h1>
            <h2 class="fw-bold mb-4">Page Not Found</h2>
            <p class="text-muted mb-5">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
            <a href="{{ url_for('index') }}" class="btn btn-primary px-5 py-3 rounded-pill fw-bold">
                <i class="fas fa-home me-2"></i> Return to Homepage
            </a>
        </div>
    </div>
</div>
{% endblock %}
