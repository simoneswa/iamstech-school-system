{% extends 'base.html' %}

{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center py-5">
        <div class="col-lg-6">
            <div class="mb-4">
                <i class="fas fa-exclamation-triangle fa-5x text-danger opacity-50"></i>
            </div>
            <h1 class="display-1 fw-black text-primary">500</h1>
            <h2 class="fw-bold mb-4">Internal Server Error</h2>
            <p class="text-muted mb-5">Something went wrong on our end. Our technical team has been notified. Please try again later or contact support if the issue persists.</p>
            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            <div class="d-flex gap-3 justify-content-center">
                <a href="{{ url_for('index') }}" class="btn btn-primary px-5 py-3 rounded-pill fw-bold">
                    <i class="fas fa-home me-2"></i> Return Home
                </a>
                <a href="https://wa.me/231880864187" target="_blank" class="btn btn-outline-success px-5 py-3 rounded-pill fw-bold">
                    <i class="fab fa-whatsapp me-2"></i> Support
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
